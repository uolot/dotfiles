# rift config
# Copy this file to ~/.config/rift/config.toml or $HOME~/.config/rift/config.toml

[settings]
# Animations
animate = false
animation_duration = 0.2
animation_fps = 120.0
animation_easing = "ease_in_out"

# Space activation behavior
default_disable = false

# Mouse/Focus behavior
mouse_follows_focus = true
focus_follows_mouse = false
mouse_hides_on_focus = false
#focus_follows_mouse_disable_hotkey = "Fn"
auto_focus_blacklist = []

# Run commands on start
# run_on_start = [
#   "rift-cli subscribe cli --event workspace_changed --command sh --args -c --args 'sketchybar --trigger rift_workspace_changed RIFT_WORKSPACE_NAME=\"$RIFT_WORKSPACE_NAME\" RIFT_WORKSPACE_ID=\"$RIFT_WORKSPACE_ID\"'",
#   "rift-cli subscribe cli --event windows_changed --command sh --args -c --args 'sketchybar --trigger rift_windows_changed RIFT_WORKSPACE_NAME=\"$RIFT_WORKSPACE_NAME\" RIFT_WINDOW_COUNT=\"$RIFT_WINDOW_COUNT\"'"
# ]
run_on_start = []

# Hot Reloading
hot_reload = true

[settings.layout]
# Layout system
# traditional | bsp | stack | master_stack | scrolling
# TODO: try bsp, stack, master_stack, scrolling
mode = "traditional"

[settings.layout.stack]
stack_offset = 40.0

# Default stacking orientation when creating a new stack.
# Options: perpendicular | same | horizontal | vertical
default_orientation = "horizontal"

[settings.layout.master_stack]
[settings.layout.scrolling]
[settings.layout.scrolling.gestures]

# Gap configuration
[settings.layout.gaps]

[settings.layout.gaps.outer]
top = 5
left = 5
bottom = 5
right = 5

[settings.layout.gaps.inner]
horizontal = 10
vertical = 10

# [settings.layout.gaps.per_display."11111111-2222-3333-4444-555555555555".outer]

[settings.ui.menu_bar]
enabled = true
show_empty = true
mode = "all"             # all | active
active_label = "index"   # index | name
display_style = "layout" # layout | label

[settings.ui.stack_line]
enabled = true
horiz_placement = "top" # top | bottom
vert_placement = "left" # left | right
thickness = 5.0
spacing = 0.0

# experimental mission control
[settings.ui.mission_control]
enabled = true
fade_enabled = false
fade_duration_ms = 180.0

# Trackpad gestures
[settings.gestures]
enabled = false
invert_horizontal_swipe = false
swipe_vertical_tolerance = 0.4
skip_empty = true
fingers = 3
distance_pct = 0.08
haptics_enabled = true
haptic_pattern = "level_change" # generic | alignment | level_change

# Window snapping / drag-swap behavior
[settings.window_snapping]
drag_swap_fraction = 0.3

# Virtual workspaces
[virtual_workspaces]
enabled = true
default_workspace_count = 5
auto_assign_windows = true
preserve_focus_per_workspace = true
workspace_auto_back_and_forth = false
reapply_app_rules_on_title_change = false

# Workspace-specific rules
workspace_rules = []

# default_workspace = 0
workspace_names = ["first", "second", "third", "fourth", "fifth"]

# App rules (automatic assignment)
# Rule options:
#   - workspace (integer)
#   - floating (boolean)
#   - manage (boolean)
# Examples:
#   - Float any window with "Preferences" in the title:
#       app_rules = [
#         { title_substring = "Preferences", floating = true },
#       ]
#   - Match by app name substring and workspace:
#       app_rules = [
#         { app_name = "Calendar", workspace = 2, floating = true },
#       ]
#   - Accessibility example: float dialog windows for a specific app:
#       app_rules = [
#         { app_id = "com.example.X", ax_subrole = "AXDialog", floating = true },
#       ]
app_rules = []

# Modifier combinations that can be reused in key bindings
# Define common modifier combinations to avoid repetition.
# Example usage: with `comb2 = "Alt + Shift"`, you can write:
#   "comb2 + H" = { move_node = "left" }
[modifier_combinations]
comb1 = "Meta + Alt + Ctrl + Shift"
comb2 = "Alt + Ctrl + Shift"

[keys]
# Key binding syntax
# - Use quotes around the key: "Alt + Shift + H"
# - Supported modifiers: Alt, Ctrl, Shift, Meta (Meta = Command ⌘ on macOS)
# - Arrow keys can be written as ArrowUp/ArrowDown/ArrowLeft/ArrowRight, or just Up/Down/Left/Right
# - Spacing is flexible: "Alt+Down" and "Alt + Down" are equivalent
# - Key values map to commands (see list below)

# Commands
# - toggle_space_activated
# - next_workspace / prev_workspace
# - next_workspace = true|false (optional skip-empty override)
# - prev_workspace = true|false (optional skip-empty override)
# - switch_to_workspace = N
# - move_window_to_workspace = N / move_window_to_workspace = { workspace = N, window_id = 123 } (optional window id)
# - create_workspace
# - switch_to_last_workspace
# - set_workspace_layout = { mode = "traditional"|"bsp"|"stack"|"master_stack"|"scrolling" } (active workspace)
# - set_workspace_layout = { workspace = N, mode = "traditional"|"bsp"|"stack"|"master_stack"|"scrolling" }
# - next_window / prev_window (focus wraps when it reaches last window in current workspace)
# - ascend / descend
# - move_focus = "left"|"right"|"up"|"down"
# - move_node = "left"|"right"|"up"|"down"
# - join_window = "left"|"right"|"up"|"down"
# - toggle_stack / toggle_orientation / unjoin_windows
# - toggle_focus_floating / toggle_window_floating / toggle_fullscreen / toggle_fullscreen_within_gaps
# - resize_window_grow / resize_window_shrink / resize_window_by = 0.05
# - swap_windows = [123, 456]
# - exec = "command" | exec = ["cmd", "arg1", "..."]
# - move_mouse_to_display = "left"|"right"|"up"|"down"|N|"<display_uuid>"
# - move_window_to_display = { selector = "left"|"right"|"up"|"down"|N|"<display_uuid>", window_id = 123 }
# - close_window = { window_server_id = 123 }
# - focus_window = { window_id = 123, window_server_id = 456 }
# - show_mission_control_all / show_mission_control_current / dismiss_mission_control (this is rift's own mission control, not macOS's)

# the following commands *only* work when the master stack layout is active
# - adjust_master_ratio = 0.05 / adjust_master_count = 1
# - promote_to_master / swap_master_stack

# the following commands *only* work when the scrolling layout is active
# - scroll_strip = { delta = 0.5 }
# - snap_strip / center_selection

# Not assigned:
# - next_workspace
# - prev_workspace
# - create_workspace
# - set_workspace_layout = { mode = "traditional"|"bsp"|"stack"|"master_stack"|"scrolling" } (active workspace)
# - next_window
# - prev_window
# - ascend
# - descend
# - swap_windows = [123, 456]
# - close_window = { window_server_id = 123 }
# - focus_window = { window_id = 123, window_server_id = 456 }
# - dismiss_mission_control

# NOTE: New, re-evaluate
"comb1 + N" = "next_window"
"comb1 + P" = "prev_window"

# NOTE: New, re-evaluate
"comb2 + O" = { set_workspace_layout = { mode = "traditional" } }
"comb2 + B" = { set_workspace_layout = { mode = "bsp" } }
"comb2 + M" = { set_workspace_layout = { mode = "master_stack" } }
# "comb2 + S" = { set_workspace_layout = { mode = "stack" } }
# "comb2 + C" = { set_workspace_layout = { mode = "scrolling" } }
"comb2 + P" = "promote_to_master"
"comb2 + S" = "swap_master_stack"

# Enable / disable rift
"comb1 + Z" = "toggle_space_activated"
"comb2 + Z" = "toggle_space_activated"
# Quit rift (with confirmation)
"comb2 + X" = "save_and_exit"

# Move focus
"comb1 + H" = { move_focus = "left" }
"comb1 + J" = { move_focus = "down" }
"comb1 + K" = { move_focus = "up" }
"comb1 + L" = { move_focus = "right" }

# Move windows
"comb2 + H" = { move_node = "left" }
"comb2 + J" = { move_node = "down" }
"comb2 + K" = { move_node = "up" }
"comb2 + L" = { move_node = "right" }

# Switch to workspace
"comb1 + Q" = { switch_to_workspace = 0 }
"comb1 + W" = { switch_to_workspace = 1 }
"comb1 + E" = { switch_to_workspace = 2 }
"comb1 + R" = { switch_to_workspace = 3 }
"comb1 + T" = { switch_to_workspace = 4 }
"comb1 + 1" = { switch_to_workspace = 0 }
"comb1 + 2" = { switch_to_workspace = 1 }
"comb1 + 3" = { switch_to_workspace = 2 }
"comb1 + 4" = { switch_to_workspace = 3 }
"comb1 + 5" = { switch_to_workspace = 4 }

# Move focused window to workspace
"comb2 + Q" = { move_window_to_workspace = 0 }
"comb2 + W" = { move_window_to_workspace = 1 }
"comb2 + E" = { move_window_to_workspace = 2 }
"comb2 + R" = { move_window_to_workspace = 3 }
"comb2 + T" = { move_window_to_workspace = 4 }
"comb2 + 1" = { move_window_to_workspace = 0 }
"comb2 + 2" = { move_window_to_workspace = 1 }
"comb2 + 3" = { move_window_to_workspace = 2 }
"comb2 + 4" = { move_window_to_workspace = 3 }
"comb2 + 5" = { move_window_to_workspace = 4 }

# Switch to last workspace
"comb1 + Tab" = "switch_to_last_workspace"
"comb2 + Tab" = "switch_to_last_workspace"

# Join windows
# "comb1 + Left" = { join_window = "left" }
# "comb1 + Right" = { join_window = "right" }
# "comb1 + Up" = { join_window = "up" }
# "comb1 + Down" = { join_window = "down" }
# "comb1 + P" = "unjoin_windows"

# Move mouse between displays
"comb1 + Left" = { move_mouse_to_display = "left" }
"comb1 + Right" = { move_mouse_to_display = "right" }
"comb1 + Up" = { move_mouse_to_display = "up" }
"comb1 + Down" = { move_mouse_to_display = "down" }

# Move window between displays
"comb2 + Left" = { move_window_to_display = { selector = "left" } }
"comb2 + Right" = { move_window_to_display = { selector = "right" } }
"comb2 + Up" = { move_window_to_display = { selector = "up" } }
"comb2 + Down" = { move_window_to_display = { selector = "down" } }

# Stack / orientation
"comb1 + S" = "toggle_stack"
"comb1 + O" = "toggle_orientation"

# Floating
# TODO: review these
"comb1 + F" = "toggle_window_floating"
"comb2 + F" = "toggle_focus_floating"  # briefly bring focus to floating window

# toggle_fullscreen
# TODO: review these
"comb1 + Enter" = "toggle_fullscreen"
"comb2 + Enter" = "toggle_fullscreen_within_gaps"

# smartly resize windows
"comb1 + U" = "resize_window_grow"
"comb2 + U" = "resize_window_grow"
"comb1 + I" = "resize_window_shrink"
"comb2 + I" = "resize_window_shrink"

# mission control
"comb1 + M" = "show_mission_control_current"
# "comb2 + M" = "show_mission_control_all"
